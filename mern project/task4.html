<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body style="text-align: center;">
    <caption><h2>Registration form</h2></caption>
   <form>
    <b>Name:</b> 
    <input type="text" placeholder="Enter your name">
    <br>
    <b>Email:</b>
    <input type="email" placeholder="Enter mail Id">
    <br>
    <b>Password:</b>
    <input type="password" placeholder="Enter your password">
    <br>
      <b>Gender:</b>
      <input type="radio" name="gender" >male
      <input type="radio" name="gender"> female
    <br>
    <b>Branch:</b>
    <input type="text" placeholder="Enter your branch">
    <br>
    <b>Skills:</b>
    <input type="checkbox">HTML <input type="checkbox"> java <input type="checkbox"> python
    <br>
    <b>Submit:</b>
    <input type="submit">
   </form>
</body>
</html>
